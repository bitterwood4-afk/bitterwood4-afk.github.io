<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BITTERWOOD's COFFEE BREAK</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hi+Melody&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Single+Day&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#e9ece6;
    --paper:rgba(255,255,255,.88);
    --ink:#0f172a;
    --muted:rgba(15,23,42,.55);
    --line:rgba(15,23,42,.14);
    --shadow:0 18px 60px rgba(0,0,0,.16);
    --shadow2:0 10px 28px rgba(0,0,0,.14);
    --radius:26px;
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    font-family: "Hi Melody", "Noto Sans KR", system-ui, -apple-system, sans-serif;
    color:var(--ink);
    background:var(--bg);
    overflow-x:hidden;
  }

  .hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }
  .hero::before{
    content:"";
    position:absolute;
    inset:-80px;
    background:
      radial-gradient(1200px 700px at 20% 12%, rgba(255,255,255,.78), transparent 60%),
      radial-gradient(900px 600px at 82% 10%, rgba(255,255,255,.62), transparent 60%),
      radial-gradient(1100px 900px at 72% 92%, rgba(2, 6, 23, .07), transparent 65%),
      linear-gradient(180deg, rgba(255,255,255,.12), transparent 55%);
    pointer-events:none;
  }

  .panel{
    position:relative;
    width:min(1140px, 100%);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:22px;
    backdrop-filter: blur(12px);
  }

  /* ===== 배너 ("https://bitterwood4-afk.github.io/main/files/cappucino.png") ===== */
  .banner{
    position:relative;
    width:100%;
    height:260px;
    border-radius:22px;
    overflow:hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,.18);

    background-image:url("https://bitterwood4-afk.github.io/main/files/cappucino.png");
    background-size:cover;
    background-position:left center;
    background-repeat:no-repeat;
  }
  /* 텍스트 가독성용 오버레이 */
  .banner::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
      90deg,
      rgba(0,0,0,.46) 0%,
      rgba(0,0,0,.18) 45%,
      rgba(0,0,0,0) 72%
    );
    pointer-events:none;
  }
  .banner-title{
    font-family: "Gowun Dodum", "Noto Sans KR", system-ui, sans-serif;
    position:absolute;
    left:24px;
    bottom:18px;
    color:#fff;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:clamp(20px, 2.6vw, 38px);
    text-shadow: 0 10px 28px rgba(0,0,0,.50);
    line-height:1.1;
  }
  .banner-sub{
    display:block;
    margin-top:8px;
    font-size:13px;
    letter-spacing:.12em;
    opacity:.9;
    font-weight:900;
  }

  /* ===== 포스트잇 ===== */
  .grid{
    margin-top: 30px;
    display:grid;
    gap: 40px;
    grid-template-columns:repeat(1, minmax(0,1fr));
  }
  @media (min-width:560px){ .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
  @media (min-width:940px){ .grid{ grid-template-columns:repeat(3,minmax(0,1fr)); } }

  .note{
    position:relative;
    border-radius:20px;
    padding: 18px 18px 16px;
    border:1px solid rgba(0,0,0,.10);
    box-shadow:var(--shadow2);
    transform: rotate(var(--r, 0deg));
    transition: transform .18s ease, box-shadow .18s ease;
    overflow:hidden;
  }
  .note:hover{
    transform: rotate(var(--r, 0deg)) translateY(-3px);
    box-shadow: 0 18px 40px rgba(0,0,0,.18);
  }
  .tape{
    position:absolute;
    top:10px;
    right:12px;
    width:54px;
    height:20px;
    border-radius:999px;
    background: rgba(255,255,255,.48);
    border:1px solid rgba(0,0,0,.08);
    transform: rotate(-12deg);
  }

  .meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
    font-size:13px;
    color: rgba(0,0,0,.62);
    font-weight:900;
  }
  .nick{
    display:flex;
    gap:8px;
    align-items:center;
    min-width:0;
  }
  .dot{
    width:10px;height:10px;border-radius:999px;background:rgba(0,0,0,.25);flex:0 0 auto;
  }
  .nick span{
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .content{
    font-family: "Jua", "Noto Sans KR", sans-serif;
    white-space:pre-wrap;
    word-break:break-word;
    line-height:1.7;
    font-size:17px;
    font-weight:400;
    color:#0b1220;
    min-height:56px;
  }

  /* ===== 첨부 ===== */
  .note-attachments{ margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; }
  .note-img{
    width:100%;
    max-height:230px;
    object-fit:cover;
    border-radius:14px;
    border:1px solid rgba(0,0,0,.10);
    display:block;
    cursor:pointer;
    box-shadow: 0 10px 24px rgba(0,0,0,.10);
  }
  .note-file{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 10px;
    border-radius:12px;
    background: rgba(255,255,255,.62);
    border:1px solid rgba(0,0,0,.12);
    font-size:12px;
    font-weight:700;
    text-decoration:none;
    color:var(--ink);
    width:100%;
    word-break:break-word;
    max-width:100%;
    white-space:normal; transition: background .15s ease, transform .15s ease;
  
    font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif;
  }
  .note-file:hover{
    background: rgba(255,255,255,.82);
    transform: translateY(-1px);
  }

  /* ===== 라이트박스 ===== */
  .lb{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.84);
    z-index:9999;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .lb.show{ display:flex; }
  .lb img{
    max-width:100%;
    max-height:90vh;
    border-radius:16px;
    box-shadow:0 22px 70px rgba(0,0,0,.48);
    object-fit:contain;
    background: rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
  }
  .lb-close{
    position:absolute;
    top:16px; right:20px;
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.22);
    color:#fff;
    font-size:28px;
    border-radius:999px;
    width:46px; height:46px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
  }
  .lb-close:hover{ background:rgba(255,255,255,.25); }

  @media (max-width:520px){
    .panel{ padding:16px; }
    .banner{ height:210px; border-radius:18px; }
    .banner-title{
    font-family: "Gowun Dodum", "Noto Sans KR", system-ui, sans-serif;
    position:absolute;
    left:24px;
    bottom:18px;
    color:#fff;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:clamp(20px, 2.6vw, 38px);
    text-shadow: 0 10px 28px rgba(0,0,0,.50);
    line-height:1.1;
  }
    .grid{ gap: 40px; }
    .content{ font-size:17px; }
  }
</style>
</head>

<body>
  <div class="hero">
    <div class="panel">
      <!-- ✅ 배너: files/cappucino.png -->
      <div class="banner">
        <div class="banner-title">
          BITTERWOOD's COFFEE BREAK
          <span class="banner-sub">cappuccino · ang-butter</span>
        </div>
      </div>

      <!-- ✅ 포스트잇 -->
      <div id="list" class="grid"></div>
    </div>
  </div>

  <!-- 라이트박스 -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose" aria-label="닫기">×</button>
    <img src="" id="lbImg" alt="첨부 이미지" />
  </div>

<script>
  // ===========================
  // ✅ 샘플 6개 (첨부 포함)
  // - 이미지: files/ 아래에 업로드 (예: files/sample_photo.jpg)
  // - 문서:  files/ 아래에 업로드 (예: files/sample.pdf)
  // ===========================
  const POSTS = [
    {
      nick: "BITTERWOOD",
      time: "2026.03.06",
      msg: "지식재산처에서 '25년 말에 발행한 발행물입니다. 특허 분석 가이드라인과 품질관리 매뉴얼입니다. \n유용한 자료인 것 같아요^^. \n\n클릭하면 PDF 뷰어로 넘어갑니다.",
      rot: -0.8,
      attachments: [
        {
          name: "파일1. 전략적 조사·분석 가이드라인",
          type: "application/pdf",
          url: "https://drive.google.com/file/d/1k13EqCaoPtn7dhtSVRVEe4EBXZeseVIe/view"
        },
        {
          name: "파일2. 전략적 조사ㆍ분석 품질관리 매뉴얼",
          type: "application/pdf",
          url: "https://drive.google.com/file/d/1MYLOX2NZk0YviMBln6rNIo0NVhj6wKmS/view"
        }

      ]
    },
    {
      nick: "BITTERWOOD",
      time: "2026.03.06",
      msg: "2월28일 토요일에 한국특허법학회 공개세미나 처음 가봤어요. '25년 주요 판례 4건에 대한 전문가님들의 고견을 청취할 수 있어서 너무 멋진 시간이었습니다.^^ \n\n 이미지를 본 후에는 우측 상단의 X를 눌러주셔야 여기로 돌아옵니다.",
      rot: -1.3,
      attachments: [
        { name: "2026-03-06_13-26.jpg", type: "image/jpeg", url: "https://drive.google.com/thumbnail?id=16xngBIziVJO5qUs8FchgOT_vkjTJ-rpr&sz=w1200" },
        { name: "2026-03-06 _3-28.jpg", type: "image/jpeg", url: "https://drive.google.com/thumbnail?id=1DFa7J-Z7-atU2elkmJ0v_yQkAak04L51&sz=w1200"},
        { name: "2026-03-06_13-29.jpg", type: "image/jpeg", url: "https://drive.google.com/thumbnail?id=1aECAY9NolbjYqXfJumUvOFKLRoeCT7d4&sz=w1200" }
      ]
    },
    {
      nick: "BITTERWOOD",
      time: "2026.03.06",
      msg: "일하면서 가끔 이렇게 이벤트를 올릴 수 있으면 좋을 것 같아서 만들어봤어요.❤️",
      rot: 1.2,
      attachments: []
    },
  ];

  // ✅ 랜덤 컬러 팔레트 (포스트잇 배경)
  const COLORS = ["#fff8b5","#c9f7d6","#cfe7ff","#ffd7e1","#ffe9c7","#e9d5ff","#d9f99d","#fde68a"];

  const elList = document.getElementById("list");
  const lb = document.getElementById("lb");
  const lbImg = document.getElementById("lbImg");
  const lbClose = document.getElementById("lbClose");

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[m]));
  }
  function isImage(type){ return /^image\//.test(type || ""); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function render(){
    elList.innerHTML = "";

    POSTS.forEach((p, idx)=>{
      const card = document.createElement("div");
      card.className = "note";
      card.style.setProperty("--r", (p.rot ?? 0) + "deg");
      card.style.background = p.bg || pick(COLORS);

      const atts = Array.isArray(p.attachments) ? p.attachments : [];
      let attHtml = "";
      if(atts.length){
        attHtml = '<div class="note-attachments">';
        atts.forEach((att, aidx)=>{
          if(isImage(att.type)){
            attHtml += `<img class="note-img" src="${att.url}"
              alt="${escapeHtml(att.name || "image")}"
              data-post="${idx}" data-att="${aidx}"
              title="클릭하면 크게 보기" />`;
          } else {
            attHtml += `<a class="note-file" href="${att.url}" download
              title="클릭하면 다운로드">📄 ${escapeHtml(att.name || "file")}</a>`;
          }
        });
        attHtml += '</div>';
      }

      card.innerHTML = `
        <div class="tape" aria-hidden="true"></div>
        <div class="meta">
          <div class="nick"><span class="dot"></span><span>${escapeHtml(p.nick || "익명")}</span></div>
          <div>${escapeHtml(p.time || "")}</div>
        </div>
        <div class="content">${escapeHtml(p.msg || "")}</div>
        ${attHtml}
      `;
      elList.appendChild(card);
    });
  }

  render();

  // 라이트박스 (이미지 클릭)
  elList.addEventListener("click", (e)=>{
    const img = e.target.closest("img.note-img");
    if(!img) return;
    lbImg.src = img.src;
    lb.classList.add("show");
  });
  lbClose.addEventListener("click", ()=> lb.classList.remove("show"));
  lb.addEventListener("click", e=>{ if(e.target===lb) lb.classList.remove("show"); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") lb.classList.remove("show"); });
</script>
</body>
</html>
