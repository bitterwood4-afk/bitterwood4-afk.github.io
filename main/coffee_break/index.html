<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BITTERWOOD's Coffee Break</title>

<style>

/* ==============================
기본 설정
============================== */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#e9e9e9;
font-family: 'NanumSquare', sans-serif;
display:flex;
justify-content:center;
padding:30px 15px;
}

/* ==============================
메인 프레임
============================== */

.wrap{
width:100%;
max-width:1200px;
}

.panel{
background:rgba(255,255,255,0.88);
border-radius:24px;
padding:18px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

/* ==============================
카페 배너
============================== */

.banner{

height:240px;
border-radius:20px;

background-image:url("../files/cappucino.png");
background-size:cover;
background-position:left center;
background-repeat:no-repeat;

display:flex;
align-items:center;

padding-left:60px;

position:relative;
overflow:hidden;

}

/* 배너 위 은은한 그라데이션 */

.banner::before{

content:"";
position:absolute;
inset:0;

background:linear-gradient(
90deg,
rgba(0,0,0,.45) 0%,
rgba(0,0,0,.15) 40%,
rgba(0,0,0,0) 70%
);

}

/* ==============================
배너 타이틀
============================== */

.banner-title{

position:relative;
color:white;

font-size:44px;
font-weight:800;

letter-spacing:2px;

text-shadow:
0 4px 20px rgba(0,0,0,.5);

}

/* ==============================
포스트잇 영역
============================== */

.notes{

margin-top:30px;

display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;

}

/* ==============================
포스트잇
============================== */

.note{

padding:20px;
border-radius:12px;

box-shadow:
0 8px 18px rgba(0,0,0,.12);

min-height:140px;

font-size:15px;
line-height:1.6;

transform:rotate(-1deg);

}

.note:nth-child(2){transform:rotate(1deg)}
.note:nth-child(3){transform:rotate(-2deg)}
.note:nth-child(4){transform:rotate(1deg)}
.note:nth-child(5){transform:rotate(-1deg)}
.note:nth-child(6){transform:rotate(2deg)}

.yellow{background:#fff7b1}
.pink{background:#ffd6e7}
.blue{background:#d9f1ff}
.green{background:#dbffd9}
.orange{background:#ffe3c8}
.purple{background:#f1dcff}

</style>
</head>

<body>

<div class="wrap">

<div class="panel">

<div class="banner">

<div class="banner-title">
BITTERWOOD's COFFEE BREAK
</div>

</div>


<div class="notes">

<div class="note yellow">
특허 전략 관련 좋은 자료 공유합니다.
</div>

<div class="note pink">
오늘 커피 브레이크 타임 ☕
</div>

<div class="note blue">
AI + 특허 분석 아이디어 정리중
</div>

<div class="note green">
좋은 논문 있으면 공유 부탁
</div>

<div class="note orange">
오늘 회의자료 업로드
</div>

<div class="note purple">
점심 뭐먹지…
</div>

</div>

</div>
</div>

</body>
</html>
