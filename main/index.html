<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BITTERWOOD의 특허 스터디 카페</title>

<style>
/* =========================
   ✅ NanumSquare BD 폰트 (main/files 기준)
========================= */
@font-face{
  font-family:'NanumSquare';
  src:url('./files/NANUMSQUARENEOOTF-BD.OTF') format('opentype');
  font-weight:700;
  font-style:normal;
}

*{ box-sizing:border-box; }

:root{
  --side-bg:#e9e9e9;
  --ink:#111;
  --line: rgba(0,0,0,.18);
  --panel: rgba(255,255,255,.88);
}

body{
  margin:0;
  min-height:100vh;
  background:var(--side-bg);
  overflow-x:hidden;
  font-family:'NanumSquare', sans-serif;
}

/* ========================= */
.wrap{
  max-width:1200px;
  margin:0 auto;
  min-height:100vh;
  padding:48px 0;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
    url("./files/bitterwood_background.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}

.panel{
  width:100%;
  min-height: 74vh;
  background: var(--panel);
  border:1px solid rgba(0,0,0,.10);
  border-radius:18px;
  box-shadow: 0 18px 55px rgba(0,0,0,.14);
  padding: 64px 56px 56px;
}

/* =========================
   ✅ 타이틀 + 버튼 래퍼 추가
========================= */
.title-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

/* 기존 타이틀 유지 */
.title{
  font-size: clamp(34px, 4.0vw, 66px);
  font-weight:700;
  letter-spacing:-2px;
  line-height:1.05;
  color: rgba(120,120,120,.32);
  text-shadow: 0 10px 40px rgba(0,0,0,.06);
  margin: 0 0 42px;
}

/* 문의하기 버튼 추가 */
.contact-btn{
  padding:12px 18px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.16);
  background: rgba(255,255,255,.85);
  color:#111;
  font-weight:700;
  cursor:pointer;
}

/* =========================
   ✅ 메뉴 기존 유지
========================= */
.menu{
  width:100%;
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  column-gap: 54px;
  row-gap: 16px;
  margin-top: 150px;
}

.menu a{
  display:flex;
  align-items:baseline;
  gap:10px;
  font-size:18px;
  font-weight:700;
  text-decoration:none;
  color:var(--ink);
  border-bottom:2px solid var(--line);
  padding:10px 0;
  transition: transform .22s ease, border-color .22s ease, opacity .22s ease;
}

.menu a:hover{
  transform:translateX(6px);
  border-bottom-color: rgba(0,0,0,.48);
}

.menu a .n{
  display:inline-block;
  width: 32px;
  flex: 0 0 32px;
  color: rgba(0,0,0,.50);
}

/* =========================
   🔥 index039.html의 메일 모달 그대로 추가
========================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal.active{ display:flex; }

.modal-box{
  width:92%;
  max-width:520px;
  background:#fff;
  border-radius:14px;
  padding:24px;
}

.modal-box h3{
  margin-top:0;
}

.modal-box input,
.modal-box textarea{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-family:inherit;
}

.modal-box textarea{
  min-height:120px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.modal-actions button{
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.btn-cancel{
  background:#eee;
}

.btn-submit{
  background:#3b5bdb;
  color:#fff;
}
</style>
</head>

<body>
  <div class="wrap">
    <main class="panel">

      <!-- 🔥 타이틀 + 버튼 -->
      <div class="title-row">
        <div class="title">
          BITTERWOOD의<br>
          특허 스터디 카페
        </div>
        <button class="contact-btn" onclick="openModal()">✉️ 똑똑~!(send a e-mail)</button>
      </div>

      <!-- 기존 메뉴 그대로 -->
      <nav class="menu">
        <a href="../index.html"><span class="n">1.</span><span>IP-R&amp;D 관련 취업/교육/사업 정보</span></a>
        <a href="./study/index.html"><span class="n">2.</span><span>특허 조사·검색 연습</span></a>
        <a href="./jobs/index.html"><span class="n">3.</span><span>000</span></a>

        <a href="./pages/04.html"><span class="n">4.</span><span>000</span></a>
        <a href="./pages/05.html"><span class="n">5.</span><span>000</span></a>
        <a href="./pages/06.html"><span class="n">6.</span><span>000</span></a>

        <a href="./pages/07.html"><span class="n">7.</span><span>000</span></a>
        <a href="./pages/08.html"><span class="n">8.</span><span>000</span></a>
        <a href="./pages/09.html"><span class="n">9.</span><span>000</span></a>

        <a href="./pages/10.html"><span class="n">10.</span><span>000</span></a>
        <a href="./pages/11.html"><span class="n">11.</span><span>신기술 산책 (중학생용)</span></a>
        <a href="./coffee_break/index.html"><span class="n">12.</span><span>커피 브레이크 (잡담)</span></a>
      </nav>

    </main>
  </div>

<!-- 🔥 메일 모달 -->
<div class="modal" id="contactModal">
  <div class="modal-box">
    <h3>수정 및 개선 요구</h3>
    <form action="https://formspree.io/f/여기에039의코드" method="POST">
      <label>연락 가능한 이메일 (선택)</label>
      <input type="email" name="email" placeholder="회신이 필요하시면 이메일을 남겨주세요 (선택)">
      <label>내용</label>
      <textarea name="message" required placeholder="하고 싶은 얘기를 자유롭게 적어주세요~!."></textarea>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
        <button type="submit" class="btn-submit">보내기</button>
      </div>
    </form>
  </div>
</div>

<script>
function openModal(){
  document.getElementById('contactModal').classList.add('active');
}
function closeModal(){
  document.getElementById('contactModal').classList.remove('active');
}
window.onclick=function(e){
  const modal=document.getElementById('contactModal');
  if(e.target===modal){
    modal.classList.remove('active');
  }
}
</script>

</body>
</html>
