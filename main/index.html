<title>BITTERWOOD의 특허 스터디 카페</title>

<style>
/* =========================
   ✅ NanumSquare BD 폰트 (main/files 기준)
========================= */
@font-face{
  font-family:'NanumSquare';
  src:url('./files/NANUMSQUARENEOOTF-BD.OTF') format('opentype');
  font-weight:700;
  font-style:normal;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  background:#e9e9e9; /* 좌우 여백 색 */
  overflow-x:hidden;
  font-family:'NanumSquare', sans-serif;
}

/* =========================
   ✅ 중앙 프레임 (기존 페이지 폭)
========================= */
.wrap{
  max-width:1200px;
  margin:0 auto;
  min-height:100vh;
  padding:64px 60px;

  position:relative;
  overflow:hidden;

  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* ✅ 배경은 wrap 안에만 */
.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
    url("./files/white_computer.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}

/* =========================
   ✅ 타이틀 (조금 작게 + 위쪽 배치)
========================= */
.title{
  font-size: clamp(44px, 5vw, 84px);
  font-weight:700;
  letter-spacing:-2px;
  line-height:1.05;

  color: rgba(120,120,120,.35);
  text-shadow: 0 10px 40px rgba(0,0,0,.08);

  margin: 10px 0 48px;
}

/* =========================
   ✅ 메뉴: 12개 대비 (2열 그리드)
   - 화면 넓으면 2열
   - 좁으면 1열로 자동 변경
========================= */
.menu{
  width: min(920px, 100%);
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  column-gap: 56px;
  row-gap: 22px;
}

/* 모바일에서는 1열 */
@media (max-width: 720px){
  .wrap{ padding:54px 22px; }
  .menu{ grid-template-columns: 1fr; }
}

.menu a{
  display:block;

  font-size:20px;
  font-weight:700;
  text-decoration:none;

  color:#222;
  border-bottom:2px solid rgba(0,0,0,.25);
  padding:8px 0;

  transition: all .25s ease;
}

.menu a:hover{
  transform:translateX(6px);
  border-bottom-color:#000;
}

/* 번호가 길어져도 정렬 예쁘게 */
.menu a .n{
  display:inline-block;
  width: 28px;          /* 번호폭 고정 */
  color: rgba(0,0,0,.55);
}
</style>
</head>

    <a href="./pages/06.html"><span class="n">6.</span> IP-R&amp;D 분석 템플릿</a>

    <a href="./pages/07.html"><span class="n">7.</span> 특허/논문 링크 모음</a>
