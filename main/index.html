<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BITTERWOOD의 특허 스터디 카페</title>

<style>
/* =========================
   ✅ NanumSquare BD 폰트 (main/files 기준)
========================= */
@font-face{
  font-family:'NanumSquare';
  src:url('./files/NANUMSQUARENEOOTF-BD.OTF') format('opentype');
  font-weight:700;
  font-style:normal;
}

*{ box-sizing:border-box; }

:root{
  --side-bg:#e9e9e9; /* 좌우 여백 배경 */
  --ink:#111;
  --line: rgba(0,0,0,.20);
  --panel: rgba(255,255,255,.88);
}

body{
  margin:0;
  min-height:100vh;
  background:var(--side-bg);
  overflow-x:hidden;
  font-family:'NanumSquare', sans-serif;
}

/* =========================
   ✅ 중앙 프레임 (배경이 깔리는 영역)
========================= */
.wrap{
  max-width:1200px;
  margin:0 auto;
  min-height:100vh;
  padding:56px 44px;

  position:relative;
  overflow:hidden;

  display:flex;
  align-items:flex-start;
  justify-content:center;
}

/* ✅ 배경은 wrap 안에만 */
.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
    url("./files/white_computer.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}

/* =========================
   ✅ 하얀 패널 (글자/메뉴가 들어가는 안전영역)
========================= */
.panel{
  width:min(1040px, 100%);
  min-height: calc(100vh - 56px*2);
  background: var(--panel);
  border:1px solid rgba(0,0,0,.10);
  border-radius:18px;
  box-shadow: 0 18px 55px rgba(0,0,0,.14);

  padding: 44px 52px 52px;
}

/* =========================
   ✅ 타이틀 (패널 내부에만 존재)
========================= */
.title{
  font-size: clamp(40px, 4.6vw, 78px);
  font-weight:700;
  letter-spacing:-2px;
  line-height:1.03;

  color: rgba(120,120,120,.35);
  text-shadow: 0 10px 40px rgba(0,0,0,.08);

  margin: 0 0 28px;
}

/* =========================
   ✅ 메뉴: 2열 그리드
========================= */
.menu{
  margin-top: 10px;
  width:100%;
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  column-gap: 56px;
  row-gap: 18px;
}

.menu a{
  display:flex;
  align-items:baseline;
  gap:10px;

  font-size:20px;
  font-weight:700;
  text-decoration:none;

  color:var(--ink);
  border-bottom:2px solid var(--line);
  padding:10px 0;

  transition: transform .22s ease, border-color .22s ease, opacity .22s ease;
}

.menu a:hover{
  transform:translateX(6px);
  border-bottom-color: rgba(0,0,0,.55);
}

/* 번호가 길어져도 정렬 예쁘게 */
.menu a .n{
  display:inline-block;
  width: 34px;
  flex: 0 0 34px;
  color: rgba(0,0,0,.55);
}

/* =========================
   ✅ 반응형 (모바일)
========================= */
@media (max-width: 900px){
  .wrap{ padding:44px 18px; }
  .panel{
    min-height:auto;
    padding: 34px 22px 28px;
  }
  .menu{
    grid-template-columns: 1fr;
    column-gap: 0;
  }
  .menu a{
    font-size:18px;
  }
  .menu a .n{
    width: 32px;
    flex-basis: 32px;
  }
}
</style>
</head>

<body>
  <div class="wrap">
    <main class="panel">

      <div class="title">
        BITTERWOOD의<br>
        특허 스터디 카페
      </div>

        <a href="./pages/04.html"><span class="n">4.</span><span>판례/요약 아카이브</span></a>

        <a href="./pages/05.html"><span class="n">5.</span><span>특허 검색 팁 &amp; 쿼리</span></a>
        <a href="./pages/06.html"><span class="n">6.</span><span>IP-R&amp;D 분석 템플릿</span></a>

        <a href="./pages/07.html"><span class="n">7.</span><span>특허/논문 링크 모음</span></a>
        <a href="./pages/08.html"><span class="n">8.</span><span>과제 제안서/보고서 메모</span></a>

        <a href="./pages/09.html"><span class="n">9.</span><span>세미나/컨퍼런스 캘린더</span></a>
        <a href="./pages/10.html"><span class="n">10.</span><span>도구 모음 (사이트/앱)</span></a>

        <a href="./pages/11.html"><span class="n">11.</span><span>커피 브레이크 (잡담)</span></a>
        <a href="./pages/12.html"><span class="n">12.</span><span>연락/건의사항</span></a>
      </nav>

    </main>
  </div>
</body>
</html>
