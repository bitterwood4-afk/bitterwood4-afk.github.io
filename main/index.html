<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BITTERWOOD의 특허 스터디 카페</title>

<style>
/* =========================
   ✅ NanumSquare BD 폰트 (main/files 기준)
========================= */
@font-face{
  font-family:'NanumSquare';
  src:url('./files/NANUMSQUARENEOOTF-BD.OTF') format('opentype');
  font-weight:700;
  font-style:normal;
}

*{ box-sizing:border-box; }

:root{
  --side-bg:#e9e9e9;
  --ink:#111;
  --line: rgba(0,0,0,.18);
  --panel: rgba(255,255,255,.88);
}

body{
  margin:0;
  min-height:100vh;
  background:var(--side-bg);
  overflow-x:hidden;
  font-family:'NanumSquare', sans-serif;
}

.wrap{
  max-width:1200px;
  margin:0 auto;
  min-height:100vh;
  padding:48px 0;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
    url("./files/bitterwood_background.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}

.panel{
  width:100%;
  min-height: 74vh;
  background: var(--panel);
  border:1px solid rgba(0,0,0,.10);
  border-radius:18px;
  box-shadow: 0 18px 55px rgba(0,0,0,.14);
  padding: 64px 56px 56px;
}

/* ===== ✅ 헤더 타이틀 + 피드백 버튼 (index039와 동일 방식) ===== */
.panel-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:0;
}

.title{
  font-size: clamp(34px, 4.0vw, 66px);
  font-weight:700;
  letter-spacing:-2px;
  line-height:1.05;
  color: rgba(120,120,120,.32);
  text-shadow: 0 10px 40px rgba(0,0,0,.06);
  margin: 0 0 42px;
}

/* ===== ✅ 피드백 버튼 (index039에서 그대로) ===== */
.feedback-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.12);
  background:#fff;
  color:var(--ink);
  font-weight:900;
  font-size:12px;
  cursor:pointer;
  box-shadow: 0 10px 28px rgba(0,0,0,.08);
  user-select:none;
  white-space:nowrap;
  font-family:inherit;
  flex-shrink:0;
  margin-top:4px;
}
.feedback-btn:hover{
  border-color:rgba(37,99,235,.35);
  box-shadow:0 12px 30px rgba(0,0,0,.10);
  transform:translateY(-1px);
}

/* ===== ✅ 피드백 모달 (index039에서 그대로) ===== */
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.55);
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:9999;
}
.modal-backdrop.show{ display:flex; }

.modal{
  width:min(720px, 100%);
  background:rgba(255,255,255,.96);
  border:1px solid rgba(2,6,23,.14);
  border-radius:18px;
  box-shadow:0 18px 60px rgba(2,6,23,.25);
  overflow:hidden;
}
.modal-head{
  padding:14px 16px;
  background:#f8fafc;
  border-bottom:1px solid rgba(2,6,23,.10);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.modal-title{
  font-weight:950;
  font-size:14px;
  letter-spacing:-.2px;
  margin:0;
  font-family:inherit;
}
.modal-close{
  border:none;
  background:transparent;
  font-size:20px;
  line-height:1;
  cursor:pointer;
  padding:6px 8px;
  border-radius:10px;
  color:#0f172a;
}
.modal-close:hover{ background:rgba(2,6,23,.06); }

.modal-body{
  padding:14px 16px 16px;
  display:grid;
  gap:10px;
}
.modal-hint{
  color:#64748b;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
  font-family:inherit;
}
.field{ display:grid; gap:6px; }
.label{ font-size:12px; font-weight:900; color:#0f172a; }
.m-input, .m-textarea{
  width:100%;
  border-radius:14px;
  border:1px solid rgba(2,6,23,.12);
  background:#fff;
  padding:12px;
  font-size:14px;
  outline:none;
  font-family:inherit;
}
.m-textarea{ min-height:140px; resize:vertical; }
.m-input:focus, .m-textarea:focus{
  border-color:rgba(37,99,235,.45);
  box-shadow:0 0 0 4px rgba(37,99,235,.12);
}
.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:6px;
}
.m-btn{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(2,6,23,.12);
  background:#fff;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
}
.m-btn-primary{
  background:#2563eb;
  color:#fff;
  border-color:rgba(37,99,235,.45);
}
.m-btn:disabled{ opacity:.6; cursor:not-allowed; }

.m-toast{
  display:none;
  margin-top:6px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(22,163,74,.10);
  border:1px solid rgba(22,163,74,.25);
  color:#065f46;
  font-weight:900;
  font-size:12px;
  font-family:inherit;
}
.m-toast.show{ display:block; }

/* ===== 메뉴 ===== */
.menu{
  width:100%;
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  column-gap: 54px;
  row-gap: 16px;
  margin-top: 150px;
}

.menu a{
  display:flex;
  align-items:baseline;
  gap:10px;
  font-size:18px;
  font-weight:700;
  text-decoration:none;
  color:var(--ink);
  border-bottom:2px solid var(--line);
  padding:10px 0;
  transition: transform .22s ease, border-color .22s ease, opacity .22s ease;
}
.menu a:hover{
  transform:translateX(6px);
  border-bottom-color: rgba(0,0,0,.48);
}
.menu a .n{
  display:inline-block;
  width: 32px;
  flex: 0 0 32px;
  color: rgba(0,0,0,.50);
}

/* ===== 반응형 ===== */
@media (max-width: 900px){
  .panel{ min-height:auto; padding:52px 28px 34px; }
  .menu{ grid-template-columns:1fr; column-gap:0; row-gap:14px; }
  .menu a{ font-size:16px; padding:9px 0; }
  .panel-header{ flex-direction:column; align-items:flex-start; }
}
@media (max-width: 480px){
  .wrap{ padding:26px 14px; }
  .panel{ padding:40px 18px 22px; border-radius:16px; }
  .title{ font-size:clamp(28px, 8vw, 44px); margin:0 0 26px; letter-spacing:-1.5px; }
  .menu a{ font-size:15px; gap:8px; }
  .menu a .n{ width:28px; flex-basis:28px; }
}
</style>
</head>

<body>
  <div class="wrap">
    <main class="panel">

      <!-- ✅ 헤더: 타이틀 + 피드백 버튼 -->
      <div class="panel-header">
        <div class="title">
          BITTERWOOD의<br>
          특허 스터디 카페
        </div>
        <button class="feedback-btn" id="feedbackBtn" type="button">✉️ 수정 및 개선 요구</button>
      </div>

      <nav class="menu">
        <a href="../index.html"><span class="n">1.</span><span>IP-R&amp;D 관련 취업/교육/사업 정보</span></a>
        <a href="./study/index.html"><span class="n">2.</span><span>특허 조사·검색 연습</span></a>
        <a href="./jobs/index.html"><span class="n">3.</span><span>000</span></a>

        <a href="./pages/04.html"><span class="n">4.</span><span>000</span></a>
        <a href="./pages/05.html"><span class="n">5.</span><span>000</span></a>
        <a href="./pages/06.html"><span class="n">6.</span><span>000</span></a>

        <a href="./pages/07.html"><span class="n">7.</span><span>000</span></a>
        <a href="./pages/08.html"><span class="n">8.</span><span>000</span></a>
        <a href="./pages/09.html"><span class="n">9.</span><span>000</span></a>

        <a href="./pages/10.html"><span class="n">10.</span><span>000</span></a>
        <a href="new_tech/index.html"><span class="n">11.</span><span>신기술 산책 (중학생용)</span></a>
        <a href="coffee_break/index.html"><span class="n">12.</span><span>커피 브레이크 (잡담)</span></a>
      </nav>

    </main>
  </div>

  <!-- ✅ 피드백 모달 (index039와 동일 구조) -->
  <div class="modal-backdrop" id="feedbackModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
      <div class="modal-head">
        <h3 class="modal-title" id="feedbackTitle">수정 및 개선 요구</h3>
        <button class="modal-close" id="feedbackClose" type="button" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-hint">
          아래에 내용을 적어 보내주시면, 운영자 메일로 전달됩니다.<br>
          (※ 이 페이지에는 운영자 이메일 주소가 표시되지 않습니다.)
        </div>
        <form id="feedbackForm">
          <div class="field">
            <div class="label">연락 가능한 이메일 (선택)</div>
            <input class="m-input" type="email" name="reply_to" autocomplete="email"
              placeholder="답변이 필요하면 이메일을 남겨주세요 (선택)" />
          </div>
          <div class="field" style="margin-top:10px;">
            <div class="label">내용</div>
            <textarea class="m-textarea" name="message"
              placeholder="어떤 점을 수정/추가하면 좋을지 구체적으로 적어주세요." required></textarea>
          </div>
          <div class="modal-actions">
            <button class="m-btn" id="feedbackCancel" type="button">취소</button>
            <button class="m-btn m-btn-primary" id="feedbackSend" type="submit">보내기</button>
          </div>
          <div class="m-toast" id="feedbackToast">✅ 전송 완료! 감사합니다.</div>
        </form>
      </div>
    </div>
  </div>

  <!-- ✅ 메일 전송 JS (index039와 동일 로직) -->
  <script>
  (function(){
    const btn       = document.getElementById('feedbackBtn');
    const modal     = document.getElementById('feedbackModal');
    const closeBtn  = document.getElementById('feedbackClose');
    const cancelBtn = document.getElementById('feedbackCancel');
    const form      = document.getElementById('feedbackForm');
    const sendBtn   = document.getElementById('feedbackSend');
    const toast     = document.getElementById('feedbackToast');

    const FORMSPREE_ENDPOINT = "https://formspree.io/f/xnjbranr";
    const useMailtoFallback  = false;

    function openModal(){
      modal.classList.add('show');
      modal.setAttribute('aria-hidden','false');
      const first = modal.querySelector('input,textarea,button');
      if(first) setTimeout(()=>first.focus(), 50);
    }
    function closeModal(){
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden','true');
      toast.classList.remove('show');
      form.reset();
    }

    btn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e)=>{ if(e.target===modal) closeModal(); });
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });

    async function formspreeSend(payload){
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method:'POST',
        headers:{ 'Accept':'application/json', 'Content-Type':'application/json' },
        body: JSON.stringify({
          reply_to: payload.reply_to || '',
          subject:  payload.subject  || '',
          message:  payload.message  || '',
          page:     location.href    || ''
        })
      });
      if(!res.ok) throw new Error('send_failed');
    }

    function mailtoSend(payload){
      const to  = "feedback" + "@" + "example.com";
      const sub = encodeURIComponent(payload.subject || '수정 및 개선 요구');
      const bod = encodeURIComponent(
        (payload.message||'') +
        '\n\n---\n회신 이메일: ' + (payload.reply_to||'(없음)') +
        '\n페이지: ' + location.href
      );
      location.href = `mailto:${to}?subject=${sub}&body=${bod}`;
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(form);
      const payload = {
        reply_to: (fd.get('reply_to')||'').toString().trim(),
        subject:  '수정 및 개선 요구',
        message:  (fd.get('message') ||'').toString().trim()
      };
      sendBtn.disabled = true;
      try {
        if(useMailtoFallback){
          mailtoSend(payload);
          closeModal();
        } else {
          await formspreeSend(payload);
          toast.classList.add('show');
          setTimeout(()=>closeModal(), 1200);
        }
      } catch(err){
        console.error(err);
        alert('전송에 실패했어요. 잠시 후 다시 시도해 주세요.');
      } finally {
        sendBtn.disabled = false;
      }
    });
  })();
  </script>
</body>
