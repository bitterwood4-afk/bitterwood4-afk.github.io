<title>BITTERWOOD의 특허 스터디 카페</title>

<style>
/* =========================
   ✅ NanumSquare BD 폰트 (main/files 기준)
========================= */
@font-face{
  font-family:'NanumSquare';
  src:url('./files/NANUMSQUARENEOOTF-BD.OTF') format('opentype');
  font-weight:700;
  font-style:normal;
}

*{ box-sizing:border-box; }

:root{
  --side-bg:#e9e9e9;
  --ink:#111;
  --line: rgba(0,0,0,.18);
  --panel: rgba(255,255,255,.88);
}

body{
  margin:0;
  min-height:100vh;
  background:var(--side-bg);
  overflow-x:hidden;
  font-family:'NanumSquare', sans-serif;
}

/* =========================
   ✅ 중앙 프레임 (배경이 깔리는 영역)
   - 패널을 "가운데" 놓기 위해 중앙정렬
========================= */
.wrap{
  max-width:1200px;
  margin:0 auto;
  min-height:100vh;
  padding:48px 22px;

  position:relative;
  overflow:hidden;

  display:flex;
  align-items:center;      /* ✅ 세로 가운데 느낌 */
  justify-content:center;  /* ✅ 가로 가운데 */
}

/* ✅ 배경은 wrap 안에만 */
.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
    url("./files/white_computer.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}

/* =========================
   ✅ 하얀 패널 (글자/메뉴가 들어가는 안전영역)
   - 너무 위/아래 치우치지 않게 크기 잡기
========================= */
.panel{
  width:min(980px, 100%);
  /* 너무 길게 늘어지지 않도록 적당히 */
  min-height: 74vh;

  background: var(--panel);
  border:1px solid rgba(0,0,0,.10);
  border-radius:18px;
  box-shadow: 0 18px 55px rgba(0,0,0,.14);

  padding: 64px 56px 56px;
}

/* =========================
   ✅ 타이틀 (조금 더 작게)
========================= */
.title{
  font-size: clamp(34px, 4.0vw, 66px);  /* ✅ 기존보다 다운 */
  font-weight:700;
  letter-spacing:-2px;
  line-height:1.05;

  color: rgba(120,120,120,.32);
  text-shadow: 0 10px 40px rgba(0,0,0,.06);

  margin: 0 0 42px; /* ✅ 제목-목차 간격 */
}

/* =========================
   ✅ 메뉴: 2열 그리드
========================= */
.menu{
  width:100%;
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  column-gap: 54px;
  row-gap: 16px;

  margin-top: 100px;   /* ✅ 목차 아래로 내림 */
}

.menu a{
  display:flex;
  align-items:baseline;
  gap:10px;

  font-size:18px;          /* ✅ 메뉴 글자 작게 */
  font-weight:700;
  text-decoration:none;

  color:var(--ink);
  border-bottom:2px solid var(--line);
  padding:10px 0;

  transition: transform .22s ease, border-color .22s ease, opacity .22s ease;
}

.menu a:hover{
  transform:translateX(6px);
  border-bottom-color: rgba(0,0,0,.48);
}

/* 번호 정렬 */
.menu a .n{
  display:inline-block;
  width: 32px;
  flex: 0 0 32px;
  color: rgba(0,0,0,.50);
}

/* =========================
   ✅ 태블릿 이하
========================= */
@media (max-width: 900px){
  .panel{
    min-height: auto;
    padding: 52px 28px 34px;
  }
  .menu{
    grid-template-columns: 1fr; /* ✅ 1열 */
    column-gap: 0;
    row-gap: 14px;
  }
  .menu a{
    font-size:16px;
    padding:9px 0;
  }
}

/* =========================
   ✅ 스마트폰(작은 화면) 최적화
========================= */
@media (max-width: 480px){
  .wrap{ padding:26px 14px; }
  .panel{
    padding: 40px 18px 22px;
    border-radius:16px;
  }
  .title{
    font-size: clamp(28px, 8vw, 44px);
    margin: 0 0 26px;
    letter-spacing:-1.5px;
  }
  .menu a{
    font-size:15px;
    gap:8px;
  }
  .menu a .n{
    width: 28px;
    flex-basis: 28px;
  }
}
</style>
</head>
